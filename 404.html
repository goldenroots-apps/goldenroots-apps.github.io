<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0a0a0a">
  <title>Page Not Found – Golden Roots</title>
  <link rel="icon" href="/assets/images/goldenroots-logo.png">
  <script>
    (function () {
      try {
        var s = localStorage.getItem("theme");
        document.documentElement.setAttribute("data-theme", s === "light" ? "light" : "dark");
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <div class="site-nav__inner">
      <a href="/" class="brand">
        <img src="/assets/images/goldenroots-logo.png" alt="" width="28" height="28" decoding="async">
        <span>Golden Roots</span>
      </a>
      <div class="nav-tools">
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme" aria-pressed="false">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="not-found">
    <div>
      <div class="not-found__number" aria-hidden="true">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <a href="/" class="btn btn--gradient">← Back to Home</a>
    </div>
  </main>

  <script src="/assets/js/theme.js"></script>
</body>
</html>
